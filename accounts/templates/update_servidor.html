{% extends 'base.html' %}

{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/style_login.css' %}">
{% endblock %}

{% block content %}

<div class="container mt-4">
    <h3 class="display-6"> Editar Servidor </h3>
    
    <div class="card">
        <div class="card-body">
                        
            <form method="post" class="form">
                {% csrf_token %}

                {{form.as_p}}
                <button type="submit" class="btn btn-danger"> Atualizar </button>
            </form>
            <a href="{% url 'list_servidor' %}" class="btn btn-secondary mt-3">Retornar Lista Servidores </a>
        </div>

    </div>
</div>
    

{%endblock%}
