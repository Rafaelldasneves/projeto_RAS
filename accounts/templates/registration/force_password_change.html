{% extends 'base.html' %}

{% block title %}Alterar senha obrigatória{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="mb-4">Alterar senha</h2>
                    <p class="text-muted">Você precisa alterar sua senha temporária antes de continuar.</p>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary">Salvar nova senha</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
